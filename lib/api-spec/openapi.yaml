openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: AussieClean Booking Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking CRUD operations
  - name: pricing
    description: Quote and pricing operations
  - name: checkout
    description: Stripe checkout sessions
  - name: service-areas
    description: Service area lookups
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - in: query
          name: email
          schema:
            type: string
          description: Filter by customer email
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, pending, confirmed, in_progress, completed, cancelled]
          description: Filter by status
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status or details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pricing/quote:
    post:
      operationId: getQuote
      tags: [pricing]
      summary: Calculate a dynamic price quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "200":
          description: Quote calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout/session:
    post:
      operationId: createCheckoutSession
      tags: [checkout]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /service-areas:
    get:
      operationId: listServiceAreas
      tags: [service-areas]
      summary: List all active service areas
      responses:
        "200":
          description: List of service areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceArea"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - error

    # ── Shared enums referenced by multiple schemas ─────────────────────────
    ServiceType:
      type: string
      enum:
        - standard_clean
        - deep_clean
        - end_of_lease
        - carpet_clean
        - window_clean
        - office_clean
        - strata_clean
        - retail_clean
        - hospitality_clean
        - medical_clean
        - aged_care_clean
        - school_clean
        - industrial_clean
        - post_construction_clean
        - pressure_wash
        - eco_clean
        - biohazard_clean
        - solar_duct_clean
        - ndis_support

    PropertyType:
      type: string
      enum:
        - house
        - apartment
        - townhouse
        - unit
        - office
        - commercial
        - warehouse
        - medical_facility
        - strata
        - hospitality
        - retail
        - school

    Booking:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [draft, pending, confirmed, in_progress, completed, cancelled]
        serviceType:
          $ref: "#/components/schemas/ServiceType"
        propertyType:
          $ref: "#/components/schemas/PropertyType"
        bedrooms:
          type: integer
        bathrooms:
          type: integer
        extras:
          type: array
          items:
            type: string
        date:
          type: string
        timeSlot:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
          nullable: true
        quoteAmountCents:
          type: integer
        gstAmountCents:
          type: integer
        currency:
          type: string
        stripeSessionId:
          type: string
          nullable: true
        stripePaymentId:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - status
        - serviceType
        - propertyType
        - bedrooms
        - bathrooms
        - extras
        - date
        - timeSlot
        - addressLine1
        - suburb
        - state
        - postcode
        - firstName
        - lastName
        - email
        - phone
        - quoteAmountCents
        - gstAmountCents
        - currency
        - createdAt
        - updatedAt

    CreateBookingRequest:
      type: object
      properties:
        serviceType:
          $ref: "#/components/schemas/ServiceType"
        propertyType:
          $ref: "#/components/schemas/PropertyType"
        bedrooms:
          type: integer
          minimum: 1
          maximum: 10
        bathrooms:
          type: integer
          minimum: 1
          maximum: 10
        extras:
          type: array
          items:
            type: string
        date:
          type: string
        timeSlot:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        notes:
          type: string
        quoteAmountCents:
          type: integer
        gstAmountCents:
          type: integer
      required:
        - serviceType
        - propertyType
        - bedrooms
        - bathrooms
        - extras
        - date
        - timeSlot
        - addressLine1
        - suburb
        - state
        - postcode
        - firstName
        - lastName
        - email
        - phone

    UpdateBookingRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, pending, confirmed, in_progress, completed, cancelled]
        stripeSessionId:
          type: string
        stripePaymentId:
          type: string
        notes:
          type: string

    QuoteRequest:
      type: object
      properties:
        serviceType:
          $ref: "#/components/schemas/ServiceType"
        propertyType:
          $ref: "#/components/schemas/PropertyType"
        bedrooms:
          type: integer
          minimum: 1
          maximum: 10
        bathrooms:
          type: integer
          minimum: 1
          maximum: 10
        extras:
          type: array
          items:
            type: string
        suburb:
          type: string
        state:
          type: string
        date:
          type: string
        timeSlot:
          type: string
      required:
        - serviceType
        - bedrooms
        - bathrooms

    QuoteResponse:
      type: object
      properties:
        quoteAmountCents:
          type: integer
        gstAmountCents:
          type: integer
        totalAmountCents:
          type: integer
        currency:
          type: string
        dynamicMultiplier:
          type: number
        breakdown:
          type: object
          properties:
            base:
              type: integer
            demand:
              type: integer
            timeSlot:
              type: integer
            extras:
              type: integer
            weather:
              type: integer
            traffic:
              type: integer
            staffAvailability:
              type: integer
          required:
            - base
            - demand
            - timeSlot
            - extras
            - weather
            - traffic
            - staffAvailability
        factorsApplied:
          type: object
          properties:
            demand:
              type: number
            timeSlot:
              type: number
            weather:
              type: number
            traffic:
              type: number
            staffAvailability:
              type: number
          required:
            - demand
            - timeSlot
            - weather
            - traffic
            - staffAvailability
        validUntil:
          type: string
      required:
        - quoteAmountCents
        - gstAmountCents
        - totalAmountCents
        - currency
        - dynamicMultiplier
        - breakdown
        - factorsApplied
        - validUntil

    CreateCheckoutSessionRequest:
      type: object
      properties:
        quoteAmountCents:
          type: integer
        bookingId:
          type: string
        customerEmail:
          type: string
          format: email
        serviceDescription:
          type: string
        serviceType:
          type: string
        extrasStr:
          type: string
        suburb:
          type: string
        frequency:
          type: string
          enum: [once, fortnightly, weekly]
        tipAmountCents:
          type: integer
          minimum: 0
      required:
        - quoteAmountCents
        - bookingId
        - customerEmail

    CheckoutSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        url:
          type: string
      required:
        - sessionId
        - url

    ServiceArea:
      type: object
      properties:
        id:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        active:
          type: boolean
      required:
        - id
        - suburb
        - state
        - postcode
        - active
